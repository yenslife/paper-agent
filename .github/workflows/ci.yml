name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend dependencies
        run: uv sync --frozen --dev

      - name: Run backend tests
        run: uv run pytest

      - name: Run Python compile check
        run: uv run python -m py_compile $(find paper_agent -name '*.py' -print)

  browser-service:
    name: Browser Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: browser-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install browser-service dependencies
        run: uv sync --frozen

      - name: Install Chromium for Playwright
        run: uv run playwright install --with-deps chromium

      - name: Run browser-service compile check
        run: uv run python -m py_compile $(find src -name '*.py' -print)

      - name: Run Playwright smoke test
        run: uv run python scripts/playwright_smoke.py

      - name: Run optional browser task smoke test (requires OPENAI_API_KEY)
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python scripts/browser_task_smoke.py

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend build
        run: pnpm build
